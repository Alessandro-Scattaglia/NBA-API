<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="https://upload.wikimedia.org/wikipedia/en/0/03/National_Basketball_Association_logo.svg"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NBA 2025-2026 Dashboard</title>
    <meta
      name="description"
      content="Dashboard NBA 2025-2026 con squadre, giocatori, classifica, calendario e leaders."
    />
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
